# yaml-language-server: $schema=https://raw.githubusercontent.com/soulcodex/agentic/main/schemas/profile.schema.json
meta:
  name: "TypeScript Hexagonal Microservice"
  description: >
    TypeScript backend microservice following hexagonal architecture with DDD,
    CQRS, and event-driven patterns. Uses hono, pnpm, and Vitest.
  version: "1.0.0"

fragments:
  base:
    - git-conventions
    - security
    - code-review
    - testing-philosophy
    - documentation

  languages:
    - typescript

  frameworks: []

  architecture:
    - hexagonal
    - ddd
    - cqrs
    - microservices

  practices:
    - tdd
    - api-design
    - observability
    - ci-cd

  domains: []

skills:
  - relational-database-design

output:
  build_command: "pnpm build"
  test_command: "pnpm test --run"
  lint_command: "pnpm lint"
  project_header: |
    This is a TypeScript microservice built with hexagonal architecture and DDD.
    The domain layer must remain free of framework dependencies.
    All external dependencies (HTTP, database, messaging) are adapters behind ports.

vendors:
  enabled:
    - claude
    - copilot
    - codex
    - gemini
    - opencode
